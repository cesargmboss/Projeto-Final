<header class="ford-header">
  <div class="logo">
    <a [routerLink]="['/']">
      <h1 class="ford-logo">Ford</h1>
    </a>
  </div>
  <nav>
    <ul>
      <li><a [routerLink]="['/']">Início</a></li>
      <li><a [routerLink]="['/modelos']">Modelos</a></li>
      <li><a [routerLink]="['/servicos']">Serviços</a></li>
      <li><a [routerLink]="['/dashboard']" *ngIf="isLoggedIn">Dashboard</a></li>
      <li>
        <button [routerLink]="['/login']" class="btn-login" *ngIf="!isLoggedIn">
          Login
        </button>
        <button class="btn-logout" *ngIf="isLoggedIn" (click)="logout()">
          Sair
        </button>
      </li>
    </ul>
  </nav>
</header>
